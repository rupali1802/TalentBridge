<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- Student Sidebar -->
<aside th:fragment="student-sidebar" class="sidebar">
    <div class="sidebar-header"><h3>Student Panel</h3></div>
    <ul class="sidebar-nav">
        <li><a th:href="@{/student/dashboard}" th:classappend="${currentUri == '/student/dashboard'} ? 'active' : ''">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0h4"/></svg>
            Dashboard</a></li>
        <li><a th:href="@{/student/profile}" th:classappend="${currentUri == '/student/profile'} ? 'active' : ''">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            My Profile</a></li>
        <li><a th:href="@{/student/browse-jobs}" th:classappend="${currentUri.startsWith('/student/browse')  or currentUri.startsWith('/student/job')} ? 'active' : ''">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            Browse Jobs</a></li>
        <li><a th:href="@{/student/my-applications}" th:classappend="${currentUri == '/student/my-applications'} ? 'active' : ''">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
            My Applications</a></li>
        <li><a th:href="@{/student/saved-jobs}" th:classappend="${currentUri == '/student/saved-jobs'} ? 'active' : ''">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/></svg>
            Saved Jobs</a></li>
        <li><a th:href="@{/student/change-password}" th:classappend="${currentUri == '/student/change-password'} ? 'active' : ''">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            Change Password</a></li>
    </ul>
</aside>

<!-- Employer Sidebar -->
<aside th:fragment="employer-sidebar" class="sidebar">
    <div class="sidebar-header"><h3>Employer Panel</h3></div>
    <ul class="sidebar-nav">
        <li><a th:href="@{/employer/dashboard}" th:classappend="${currentUri == '/employer/dashboard'} ? 'active' : ''">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0h4"/></svg>
            Dashboard</a></li>
        <li><a th:href="@{/employer/post-job}" th:classappend="${currentUri == '/employer/post-job'} ? 'active' : ''">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
            Post New Job</a></li>
        <li><a th:href="@{/employer/my-jobs}" th:classappend="${currentUri.startsWith('/employer/my-jobs') or currentUri.startsWith('/employer/applicants') or currentUri.startsWith('/employer/edit-job')} ? 'active' : ''">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
            My Job Listings</a></li>
        <li><a th:href="@{/employer/change-password}" th:classappend="${currentUri == '/employer/change-password'} ? 'active' : ''">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            Change Password</a></li>
    </ul>
</aside>

<!-- Admin Sidebar -->
<aside th:fragment="admin-sidebar" class="sidebar">
    <div class="sidebar-header"><h3>Admin Panel</h3></div>
    <ul class="sidebar-nav">
        <li><a th:href="@{/admin/dashboard}" th:classappend="${currentUri == '/admin/dashboard'} ? 'active' : ''">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0h4"/></svg>
            Dashboard</a></li>
        <li><a th:href="@{/admin/manage-users}" th:classappend="${currentUri == '/admin/manage-users'} ? 'active' : ''">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
            Manage Users</a></li>
        <li><a th:href="@{/admin/manage-jobs}" th:classappend="${currentUri == '/admin/manage-jobs'} ? 'active' : ''">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
            Manage Jobs</a></li>
        <li><a th:href="@{/admin/activity-log}" th:classappend="${currentUri == '/admin/activity-log'} ? 'active' : ''">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>
            Activity Log</a></li>
    </ul>
</aside>

</body>
</html>
