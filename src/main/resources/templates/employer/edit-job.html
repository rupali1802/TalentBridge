<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Edit Job')}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-layout">
    <aside th:replace="~{fragments/sidebar :: employer-sidebar}"></aside>
    <main class="main-content">
        <div class="page-header"><h1>Edit Job</h1><p>Update your job listing details</p></div>
        <div class="card" style="max-width:700px">
            <div class="card-body">
                <form th:action="@{/employer/edit-job/{id}(id=${jobDTO.id})}" th:object="${jobDTO}" method="post">
                    <div class="form-group"><label class="form-label">Job Title *</label>
                        <input type="text" th:field="*{title}" class="form-control">
                        <div th:if="${#fields.hasErrors('title')}" class="form-error" th:errors="*{title}"></div></div>
                    <div class="form-group"><label class="form-label">Description *</label>
                        <textarea th:field="*{description}" class="form-control" rows="5"></textarea>
                        <div th:if="${#fields.hasErrors('description')}" class="form-error" th:errors="*{description}"></div></div>
                    <div class="form-group"><label class="form-label">Skills Required</label>
                        <input type="text" th:field="*{skillsRequired}" class="form-control"></div>
                    <div class="form-row">
                        <div class="form-group"><label class="form-label">Location *</label>
                            <input type="text" th:field="*{location}" class="form-control">
                            <div th:if="${#fields.hasErrors('location')}" class="form-error" th:errors="*{location}"></div></div>
                        <div class="form-group"><label class="form-label">Job Type *</label>
                            <select th:field="*{jobType}" class="form-control">
                                <option value="">— Select —</option>
                                <option th:each="jt : ${jobTypes}" th:value="${jt}" th:text="${jt.displayName}"></option>
                            </select></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label class="form-label">Min Salary (₹)</label>
                            <input type="number" th:field="*{salaryMin}" class="form-control"></div>
                        <div class="form-group"><label class="form-label">Max Salary (₹)</label>
                            <input type="number" th:field="*{salaryMax}" class="form-control"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label class="form-label">Experience Level</label>
                            <select th:field="*{experienceLevel}" class="form-control">
                                <option value="">— Select —</option>
                                <option value="Entry">Entry Level</option><option value="Mid">Mid Level</option><option value="Senior">Senior Level</option>
                            </select></div>
                        <div class="form-group"><label class="form-label">Application Deadline</label>
                            <input type="date" th:field="*{applicationDeadline}" class="form-control"></div>
                    </div>
                    <div style="display:flex;gap:0.75rem">
                        <button type="submit" class="btn btn-primary btn-lg">Update Job</button>
                        <a th:href="@{/employer/my-jobs}" class="btn btn-secondary btn-lg">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
