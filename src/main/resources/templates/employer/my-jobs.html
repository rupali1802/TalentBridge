<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('My Jobs')}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-layout">
    <aside th:replace="~{fragments/sidebar :: employer-sidebar}"></aside>
    <main class="main-content">
        <div class="flex-between mb-2">
            <div class="page-header" style="margin-bottom:0"><h1>My Job Listings</h1><p>Manage all your posted jobs</p></div>
            <a th:href="@{/employer/post-job}" class="btn btn-primary">+ Post New Job</a>
        </div>
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

        <div th:if="${jobs.isEmpty()}" class="empty-state"><h3>No jobs posted yet</h3><p>Create your first job listing to start receiving applications.</p>
            <a th:href="@{/employer/post-job}" class="btn btn-primary mt-2">Post a Job</a></div>

        <div th:if="${!jobs.isEmpty()}" class="table-wrapper">
            <table>
                <thead><tr><th>Title</th><th>Location</th><th>Type</th><th>Posted</th><th>Applications</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody>
                    <tr th:each="job : ${jobs}">
                        <td class="fw-600" th:text="${job.title}">Title</td>
                        <td th:text="${job.location}">Location</td>
                        <td><span class="badge badge-primary" th:text="${job.jobType.displayName}">Type</span></td>
                        <td class="text-sm" th:text="${#temporals.format(job.postedAt,'MMM dd, yyyy')}">Date</td>
                        <td><span class="badge badge-info" th:text="${job.applications.size()}">0</span></td>
                        <td><span class="badge" th:classappend="${job.active ? 'badge-success' : 'badge-danger'}" th:text="${job.active ? 'Active' : 'Inactive'}">St</span></td>
                        <td>
                            <div style="display:flex;gap:0.4rem">
                                <a th:href="@{/employer/applicants/{id}(id=${job.id})}" class="btn btn-sm btn-outline">Applicants</a>
                                <a th:href="@{/employer/edit-job/{id}(id=${job.id})}" class="btn btn-sm btn-secondary">Edit</a>
                                <form th:action="@{/employer/delete-job/{id}(id=${job.id})}" method="post" style="margin:0">
                                    <button type="submit" class="btn btn-sm btn-danger" data-confirm="Are you sure you want to delete this job?">Delete</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
