<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Manage Users')}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-layout">
    <aside th:replace="~{fragments/sidebar :: admin-sidebar}"></aside>
    <main class="main-content">
        <div class="page-header"><h1>Manage Users</h1><p>View and manage all platform users</p></div>
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

        <div class="filters-bar">
            <form th:action="@{/admin/manage-users}" method="get">
                <div class="filters-row">
                    <div class="form-group"><label class="form-label">Search</label>
                        <input type="text" name="search" th:value="${search}" class="form-control" placeholder="Name or email"></div>
                    <div class="form-group"><label class="form-label">Role</label>
                        <select name="role" class="form-control">
                            <option value="">All Roles</option>
                            <option th:each="r : ${roles}" th:value="${r}" th:text="${r}" th:selected="${selectedRole == r}"></option>
                        </select></div>
                    <div class="form-group" style="display:flex;gap:0.5rem;align-items:flex-end">
                        <button type="submit" class="btn btn-primary">Filter</button>
                        <a th:href="@{/admin/manage-users}" class="btn btn-secondary">Clear</a>
                    </div>
                </div>
            </form>
        </div>

        <div class="table-wrapper">
            <table>
                <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Joined</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody>
                    <tr th:each="u : ${users}">
                        <td class="fw-600" th:text="${u.fullName}">Name</td>
                        <td class="text-sm" th:text="${u.email}">Email</td>
                        <td><span class="badge"
                            th:classappend="${u.role.name() == 'ADMIN'} ? 'badge-danger' : (${u.role.name() == 'EMPLOYER'} ? 'badge-warning' : 'badge-info')"
                            th:text="${u.role}">Role</span></td>
                        <td class="text-sm" th:text="${#temporals.format(u.createdAt,'MMM dd, yyyy')}">Date</td>
                        <td><span class="badge" th:classappend="${u.enabled ? 'badge-success' : 'badge-danger'}" th:text="${u.enabled ? 'Active' : 'Disabled'}">St</span></td>
                        <td>
                            <div style="display:flex;gap:0.4rem">
                                <form th:action="@{/admin/toggle-user/{id}(id=${u.id})}" method="post" style="margin:0">
                                    <button type="submit" class="btn btn-sm" th:classappend="${u.enabled ? 'btn-secondary' : 'btn-success'}" th:text="${u.enabled ? 'Disable' : 'Enable'}">Toggle</button>
                                </form>
                                <form th:if="${u.role.name() != 'ADMIN'}" th:action="@{/admin/delete-user/{id}(id=${u.id})}" method="post" style="margin:0">
                                    <button type="submit" class="btn btn-sm btn-danger" data-confirm="Delete this user permanently?">Delete</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
