<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Activity Log')}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-layout">
    <aside th:replace="~{fragments/sidebar :: admin-sidebar}"></aside>
    <main class="main-content">
        <div class="page-header"><h1>Activity Log</h1><p>Track all actions performed on the platform</p></div>
        <div th:if="${activities.isEmpty()}" class="empty-state"><h3>No activity recorded</h3><p>User actions will be logged here automatically.</p></div>
        <div th:if="${!activities.isEmpty()}" class="table-wrapper">
            <table>
                <thead><tr><th>User</th><th>Role</th><th>Action</th><th>Details</th><th>Timestamp</th></tr></thead>
                <tbody>
                    <tr th:each="log : ${activities}">
                        <td class="fw-600" th:text="${log.user.fullName}">User</td>
                        <td><span class="badge" th:classappend="${log.user.role.name() == 'ADMIN'} ? 'badge-danger' : (${log.user.role.name() == 'EMPLOYER'} ? 'badge-warning' : 'badge-info')" th:text="${log.user.role}">Role</span></td>
                        <td><span class="badge badge-secondary" th:text="${log.action}">Action</span></td>
                        <td class="text-sm" th:text="${log.details}">Details</td>
                        <td class="text-sm text-muted" th:text="${#temporals.format(log.timestamp,'MMM dd, yyyy HH:mm')}">Time</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
