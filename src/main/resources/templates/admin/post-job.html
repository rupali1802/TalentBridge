<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Post Job')}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-layout">
    <aside th:replace="~{fragments/sidebar :: admin-sidebar}"></aside>
    <main class="main-content">
        <div class="page-header">
            <div>
                <h1>Post a New Job</h1>
                <p>Create a job listing on behalf of an employer</p>
            </div>
            <a th:href="@{/admin/manage-jobs}" class="btn btn-outline">Back to Jobs</a>
        </div>
        
        <div class="card" style="max-width:800px">
            <div class="card-body">
                <form th:action="@{/admin/post-job}" th:object="${jobDTO}" method="post">
                    
                    <div class="form-group" style="background: rgba(79,70,229,0.05); padding: 1.5rem; border-radius: 12px; border: 1px dashed var(--primary); margin-bottom: 2rem;">
                        <label class="form-label" style="color: var(--primary); font-weight: 700;">Select Employer *</label>
                        <select th:field="*{employerId}" class="form-control" style="border-color: var(--primary);">
                            <option value="">— Select an Employer Company —</option>
                            <option th:each="emp : ${employers}" th:value="${emp.id}" th:text="${emp.company + ' (' + emp.fullName + ')'}"></option>
                        </select>
                        <div th:if="${employerError}" class="form-error" th:text="${employerError}"></div>
                        <p class="text-muted text-sm" style="margin-top:0.5rem">Administrators can post jobs on behalf of any registered employer on the platform.</p>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Job Title *</label>
                        <input type="text" th:field="*{title}" class="form-control" placeholder="e.g., Senior Java Developer">
                        <div th:if="${#fields.hasErrors('title')}" class="form-error" th:errors="*{title}"></div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Description *</label>
                        <textarea th:field="*{description}" class="form-control" rows="5" placeholder="Describe the role, responsibilities, and requirements"></textarea>
                        <div th:if="${#fields.hasErrors('description')}" class="form-error" th:errors="*{description}"></div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Skills Required</label>
                        <input type="text" th:field="*{skillsRequired}" class="form-control" placeholder="e.g., Java, Spring Boot, MySQL (comma-separated)">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Location *</label>
                            <input type="text" th:field="*{location}" class="form-control" placeholder="e.g., Bangalore, India">
                            <div th:if="${#fields.hasErrors('location')}" class="form-error" th:errors="*{location}"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Job Type *</label>
                            <select th:field="*{jobType}" class="form-control">
                                <option value="">— Select —</option>
                                <option th:each="jt : ${jobTypes}" th:value="${jt}" th:text="${jt.displayName}"></option>
                            </select>
                            <div th:if="${#fields.hasErrors('jobType')}" class="form-error" th:errors="*{jobType}"></div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Minimum Salary (₹)</label>
                            <input type="number" th:field="*{salaryMin}" class="form-control" placeholder="e.g., 500000">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Maximum Salary (₹)</label>
                            <input type="number" th:field="*{salaryMax}" class="form-control" placeholder="e.g., 1000000">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Experience Level</label>
                            <select th:field="*{experienceLevel}" class="form-control">
                                <option value="">— Select —</option>
                                <option value="Fresher">Fresher</option>
                                <option value="1–3 years">1–3 years</option>
                                <option value="Mid-level">Mid-level</option>
                                <option value="Senior">Senior Level</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Application Deadline</label>
                            <input type="date" th:field="*{applicationDeadline}" class="form-control">
                        </div>
                    </div>

                    <div style="margin-top:2rem">
                        <button type="submit" class="btn btn-primary btn-lg" style="padding-left:3rem; padding-right:3rem">Publish Job Listing</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
