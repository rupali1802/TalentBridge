<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Sign In')}"></head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to your TalentBridge account</p>
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <form th:action="@{/auth/login}" method="post">
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <div class="flex-between mb-2">
                <label style="display:flex;align-items:center;gap:0.4rem;font-size:0.85rem;color:var(--text-secondary)">
                    <input type="checkbox" name="remember-me"> Remember me
                </label>
                <a th:href="@{/auth/forgot-password}" class="text-sm">Forgot password?</a>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg">Sign In</button>
        </form>
        <div class="auth-footer">
            Don't have an account? <a th:href="@{/auth/register}">Create one</a>
        </div>
    </div>
</div>
</body>
</html>
