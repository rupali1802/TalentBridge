<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Forgot Password')}"></head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <h2>Forgot Password</h2>
        <p class="subtitle">Enter your email to receive a reset token</p>
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <form th:action="@{/auth/forgot-password}" method="post">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg">Send Reset Token</button>
        </form>
        <div class="auth-footer"><a th:href="@{/auth/login}">← Back to Sign In</a></div>
    </div>
</div>
</body>
</html>
