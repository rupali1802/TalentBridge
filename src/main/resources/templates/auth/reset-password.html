<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Reset Password')}"></head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <h2>Reset Password</h2>
        <p class="subtitle">Enter the token you received and your new password</p>
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <form th:action="@{/auth/reset-password}" method="post">
            <div class="form-group">
                <label class="form-label">Reset Token</label>
                <input type="text" name="token" class="form-control" placeholder="Paste your token here" required>
            </div>
            <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" name="newPassword" class="form-control" placeholder="Min 6 characters" required>
            </div>
            <div class="form-group">
                <label class="form-label">Confirm New Password</label>
                <input type="password" name="confirmPassword" class="form-control" placeholder="Repeat password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg">Reset Password</button>
        </form>
        <div class="auth-footer"><a th:href="@{/auth/login}">← Back to Sign In</a></div>
    </div>
</div>
</body>
</html>
