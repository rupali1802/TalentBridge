<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Change Password')}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-layout">
    <aside th:replace="~{fragments/sidebar :: student-sidebar}"></aside>
    <main class="main-content">
        <div class="page-header"><h1>Change Password</h1><p>Update your account password</p></div>
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
        <div class="card form-card">
            <div class="card-body">
                <form th:action="@{/student/change-password}" th:object="${passwordDTO}" method="post">
                    <div class="form-group"><label class="form-label">Current Password</label>
                        <input type="password" th:field="*{currentPassword}" class="form-control">
                        <div th:if="${#fields.hasErrors('currentPassword')}" class="form-error" th:errors="*{currentPassword}"></div></div>
                    <div class="form-group"><label class="form-label">New Password</label>
                        <input type="password" th:field="*{newPassword}" class="form-control">
                        <div th:if="${#fields.hasErrors('newPassword')}" class="form-error" th:errors="*{newPassword}"></div></div>
                    <div class="form-group"><label class="form-label">Confirm New Password</label>
                        <input type="password" th:field="*{confirmPassword}" class="form-control">
                        <div th:if="${#fields.hasErrors('confirmPassword')}" class="form-error" th:errors="*{confirmPassword}"></div></div>
                    <button type="submit" class="btn btn-primary">Update Password</button>
                </form>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
