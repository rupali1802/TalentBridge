<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('My Profile')}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-layout">
    <aside th:replace="~{fragments/sidebar :: student-sidebar}"></aside>
    <main class="main-content">
        <div class="page-header"><h1>My Profile</h1><p>Manage your personal information and resume</p></div>
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem">
            <div class="card">
                <div class="card-header">Personal Information</div>
                <div class="card-body">
                    <form th:action="@{/student/profile}" th:object="${profileDTO}" method="post">
                        <div class="form-group"><label class="form-label">Full Name</label>
                            <input type="text" th:field="*{fullName}" class="form-control">
                            <div th:if="${#fields.hasErrors('fullName')}" class="form-error" th:errors="*{fullName}"></div></div>
                        <div class="form-group"><label class="form-label">Email</label>
                            <input type="email" th:field="*{email}" class="form-control" readonly style="opacity:0.6"></div>
                        <div class="form-group"><label class="form-label">Phone</label>
                            <input type="text" th:field="*{phone}" class="form-control" placeholder="Your phone number"></div>
                        <div class="form-group"><label class="form-label">Education</label>
                            <textarea th:field="*{education}" class="form-control" rows="3" placeholder="e.g., B.Tech CSE, XYZ University, 2024"></textarea></div>
                        <div class="form-group"><label class="form-label">Skills</label>
                            <textarea th:field="*{skills}" class="form-control" rows="3" placeholder="e.g., Java, Spring Boot, React, SQL"></textarea></div>
                        <div class="form-group"><label class="form-label">Experience</label>
                            <textarea th:field="*{experience}" class="form-control" rows="3" placeholder="e.g., 1 year internship at ABC Corp"></textarea></div>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </form>
                </div>
            </div>
            <div>
                <div class="card mb-2">
                    <div class="card-header">Resume</div>
                    <div class="card-body">
                        <div th:if="${user.resumePath != null}" class="mb-2">
                            <span class="badge badge-success">✓ Resume Uploaded</span>
                            <p class="text-sm text-muted mt-1" th:text="${user.resumePath}">filename.pdf</p>
                        </div>
                        <div th:if="${user.resumePath == null}" class="mb-2">
                            <span class="badge badge-warning">No resume uploaded</span>
                        </div>
                        <form th:action="@{/student/upload-resume}" method="post" enctype="multipart/form-data">
                            <div class="form-group">
                                <label class="form-label" id="fileLabel">Choose File (PDF, DOC, DOCX — Max 5MB)</label>
                                <input type="file" name="resume" id="resumeInput" class="form-control" accept=".pdf,.doc,.docx" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-sm">Upload Resume</button>
                        </form>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header">Profile Summary</div>
                    <div class="card-body">
                        <div class="mb-1"><span class="text-sm fw-600">Name:</span> <span class="text-sm" th:text="${user.fullName}">-</span></div>
                        <div class="mb-1"><span class="text-sm fw-600">Email:</span> <span class="text-sm" th:text="${user.email}">-</span></div>
                        <div class="mb-1"><span class="text-sm fw-600">Phone:</span> <span class="text-sm" th:text="${user.phone ?: 'Not set'}">-</span></div>
                        <div class="mb-1"><span class="text-sm fw-600">Member since:</span> <span class="text-sm" th:text="${#temporals.format(user.createdAt,'MMM dd, yyyy')}">-</span></div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
