# =============================================
#  TalentBridge — Application Configuration
# =============================================

spring.application.name=TalentBridge

# ---- MySQL DataSource ----
spring.datasource.url=jdbc:mysql://localhost:3306/talentbridge?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Rupa@180206P
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

# ---- Thymeleaf ----
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ---- File Upload ----
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/resumes

# ---- Server ----
server.port=8081
server.error.whitelabel.enabled=false

# ---- Logging ----
logging.level.org.springframework.security=WARN
logging.level.com.talentbridge=INFO
